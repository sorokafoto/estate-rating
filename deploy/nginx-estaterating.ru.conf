# Пример server-блока для estaterating.ru (nginx, как introvert.bz).
# Скопируйте в sites-available и включите symlink в sites-enabled.
#
#   root /var/www/estaterating.ru;   # содержимое publish/ после npm run publish
#   certbot / Let's Encrypt для SSL

server {
    listen 80;
    listen [::]:80;
    server_name estaterating.ru www.estaterating.ru;
    return 301 https://estaterating.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.estaterating.ru;
    # ssl_certificate / ssl_certificate_key — как на основном сервере
    return 301 https://estaterating.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name estaterating.ru;

    # ssl_certificate     /etc/letsencrypt/live/estaterating.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/estaterating.ru/privkey.pem;

    root /var/www/estaterating.ru;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Запрет обхода allowlist (на случай ошибочной заливки)
    location ~ ^/(data|build|scripts|shared|private|node_modules)/ {
        return 403;
    }
    location ~* \.(xlsx|xls|csv|pem|key|env)$ {
        return 403;
    }

    # Security headers (CSP: formsubmit.co + Yandex Metrika)
    include /etc/nginx/snippets/estaterating-security-headers.conf;
}

# Файл snippets/estaterating-security-headers.conf — копия deploy/nginx-security-headers.conf:
#   include /path/to/repo/deploy/nginx-security-headers.conf;
